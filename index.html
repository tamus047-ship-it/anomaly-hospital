<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Banowy Voice Generator</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }
    .container {
      background: #1b1b1b;
      padding: 30px;
      width: 650px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 180px;
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      resize: none;
      background: #111;
      color: #fff;
    }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #3a57d8;
    }
    .history {
      margin-top: 30px;
      text-align: left;
    }
    .history-item {
      background: #222;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .history-item audio {
      width: 220px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Banowy Voice Generator</h1>

    <textarea id="text" placeholder="Write your English script here..."></textarea>
    <button id="generateBtn">Generate</button>

    <h2>History</h2>
    <div id="history" class="history"></div>

    <audio id="audio" controls style="margin-top:20px; width:100%;"></audio>
  </div>

  <script>
    const API_KEY = "sk_afab95bb135546a0abfeaee521436151c794f4c19d58f3d1";
    const VOICE_ID = "CeAjv3teQ7WvtV4vyRFm";

    document.getElementById("generateBtn").addEventListener("click", generate);

    async function generate() {
      const text = document.getElementById("text").value;
      if (!text.trim()) return;

      try {
        const response = await fetch(
          "https://api.elevenlabs.io/v1/text-to-speech/" + VOICE_ID,
          {
            method: "POST",
            headers: {
              "xi-api-key": API_KEY,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              text: text,
              model_id: "eleven_multilingual_v2",
              language: "en",
              voice_settings: {
                stability: 0.05,
                similarity_boost: 0.90,
                style: 0.85,
                use_speaker_boost: true
              }
            })
          }
        );

        if (!response.ok) {
          alert("API error: " + response.status);
          return;
        }

        const audioBlob = await response.blob();
        const audioURL = URL.createObjectURL(audioBlob);

        // główny player
        const mainAudio = document.getElementById("audio");
        mainAudio.src = audioURL;
        mainAudio.play().catch(() => {});

        // historia + download
        addToHistory(text, audioBlob);
      } catch (e) {
        console.error(e);
        alert("Error generating audio.");
      }
    }

    function addToHistory(text, audioBlob) {
      const historyDiv = document.getElementById("history");

      const audioURL = URL.createObjectURL(audioBlob);
      const downloadURL = URL.createObjectURL(audioBlob);

      const item = document.createElement("div");
      item.className = "history-item";

      item.innerHTML = `
        <div style="flex:1;">
          <strong>Text:</strong><br>${escapeHtml(text)}
        </div>
        <div>
          <audio controls src="${audioURL}"></audio>
          <br>
          <a href="${downloadURL}" download="banowy_voice.wav">Download</a>
        </div>
      `;

      historyDiv.prepend(item);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
