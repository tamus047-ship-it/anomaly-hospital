<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Banowy New Voice Generator</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }
    .container {
      background: #1b1b1b;
      padding: 30px;
      width: 650px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 180px;
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      resize: none;
      background: #111;
      color: #fff;
    }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #3a57d8; }
    .history {
      margin-top: 30px;
      text-align: left;
    }
    .history-item {
      background: #222;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .history-item audio { width: 220px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Banowy New Voice Generator</h1>

    <textarea id="text" placeholder="Write your English script here..."></textarea>
    <button onclick="generate()">Generate</button>

    <h2>History</h2>
    <div id="history" class="history"></div>

    <audio id="audio" controls style="margin-top:20px; width:100%;"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
